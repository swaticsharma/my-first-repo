name: DB migrations sanity

on:
  pull_request:
    paths:
      - 'supabase/migrations/**'
      - 'supabase/seed.sql'

jobs:
  apply:
    name: Apply migrations against ephemeral Postgres
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: medwise_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Install psql
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Stub auth schema (Supabase-only objects)
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d medwise_test <<'SQL'
          create schema if not exists auth;
          create table if not exists auth.users (id uuid primary key);
          SQL

      - name: Apply migrations in order
        env:
          PGPASSWORD: postgres
        run: |
          set -euo pipefail
          for f in supabase/migrations/*.sql; do
            echo "→ applying $f"
            psql -h localhost -U postgres -d medwise_test -v ON_ERROR_STOP=1 -f "$f"
          done

      - name: Apply seed
        env:
          PGPASSWORD: postgres
        run: psql -h localhost -U postgres -d medwise_test -v ON_ERROR_STOP=1 -f supabase/seed.sql
